apiVersion: apps/v1
kind: Deployment
metadata:
  name: fulfillment-console-proxy
spec:
  selector:
    matchLabels:
      app: fulfillment-console-proxy
  replicas: 1
  template:
    metadata:
      labels:
        app: fulfillment-console-proxy
    spec:
      volumes:
      - name: cas
        configMap:
          name: ca-bundle
      - name: tls
        secret:
          secretName: fulfillment-console-proxy-tls
      containers:
      - name: console-proxy
        image: fulfillment-service
        imagePullPolicy: IfNotPresent
        volumeMounts:
        - name: cas
          mountPath: /etc/fulfillment-console-proxy/tls/cas
        - name: tls
          mountPath: /etc/fulfillment-console-proxy/tls
        command:
        - /usr/local/bin/fulfillment-service
        - start
        - console-proxy
        - --log-level=info
        - --log-headers=false
        - --log-bodies=false
        - --ca-files=/etc/fulfillment-console-proxy/tls/cas
        - --grpc-authn-external-address=authorino-authorino-authorization:50051
        - --grpc-authn-trusted-token-issuers=https://keycloak.keycloak.svc.cluster.local:8000/realms/innabox
        - --grpc-server-address=fulfillment-api:8000
        - --http-listener-address=0.0.0.0:8000
        - --http-listener-tls-crt=/etc/fulfillment-console-proxy/tls/tls.crt
        - --http-listener-tls-key=/etc/fulfillment-console-proxy/tls/tls.key
        - --metrics-listener-address=0.0.0.0:8002
        ports:
        - name: console
          containerPort: 8000
          protocol: TCP
        - name: metrics
          containerPort: 8002
          protocol: TCP
        livenessProbe:
          httpGet:
            path: /healthz
            port: 8000
            scheme: HTTPS
          initialDelaySeconds: 5
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /healthz
            port: 8000
            scheme: HTTPS
          initialDelaySeconds: 5
          periodSeconds: 10
